name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch }}

jobs:
  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/setup
      - run: yarn biome ci .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/setup
      - run: yarn typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/setup
      - run: yarn test

  build:
    runs-on: ubuntu-latest
    needs: [biome, typecheck, test]
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    permissions:
      contents: read
      deployments: write
    environment:
      name: ${{ github.event_name == 'pull_request' && 'Preview' || 'Production' }}
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/setup
      - uses: brianespinosa/next-build-cache@main
      - run: yarn vercel pull --yes --token $VERCEL_TOKEN
      - run: yarn vercel build ${{ github.ref_name == github.event.repository.default_branch && '--prod' || '' }}
      - id: deploy
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            URL=$(yarn vercel deploy --prebuilt --token $VERCEL_TOKEN)
          else
            URL=$(yarn vercel deploy --prebuilt --prod --token $VERCEL_TOKEN)
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT

  e2e:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    env:
      PLAYWRIGHT_BASE_URL: ${{ needs.build.outputs.url }}
      VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_BYPASS_SECRET }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/setup
      - name: Install Playwright browsers
        run: yarn playwright install chromium --with-deps
      - name: Run Playwright tests
        run: yarn e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  lighthouse:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - path: /
            name: root
          - path: /P1
            name: level
          - path: /P1/3ckmgrhn
            name: level-encoded
    steps:
      - uses: actions/checkout@v6.0.2
      - id: lighthouse
        uses: treosh/lighthouse-ci-action@12.6.1
        with:
          urls: "${{ needs.build.outputs.url }}${{ matrix.path }}?x-vercel-protection-bypass=${{ secrets.VERCEL_BYPASS_SECRET }}"
          runs: 2
          uploadArtifacts: true
          artifactName: "lighthouse-${{ matrix.name }}"
          configPath: ./lighthouserc.json
