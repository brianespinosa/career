defaultSemverRangePrefix: ""

logFilters:
  - code: YN0002
    level: error
  - code: YN0060
    level: error
  - code: YN0068
    level: error
  - code: YN0086
    level: error

nodeLinker: node-modules

packageExtensions:
  "@vercel/express@*":
    peerDependencies:
      typescript: ">=4.9.5"
  "@visx/visx@*":
    peerDependencies:
      "@react-spring/web": ^9.7.5 || ^10.0.0
      react-dom: ^16.14.0 || ^17.0.0-0 || ^18.0.0-0 || ^19.0.0-0
  "@visx/xychart@*":
    peerDependencies:
      react-dom: ^16.14.0 || ^17.0.0-0 || ^18.0.0-0 || ^19.0.0-0
  vercel@*:
    peerDependencies:
      typescript: ">=4.9.5"
